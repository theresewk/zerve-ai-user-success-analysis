  compute_settings: null
  description: "Defines success in Zerve (a workflow tool) as a four-step ladder\u2014\
    activate, habit, ship, maturity\u2014and analyzes which early behaviors and user\
    \ personas drive progression. Finds 81% of users are passive observers, while\
    \ active personas (agent-led, manual-led) show 84\u201392% activation rates. Reveals\
    \ workflow-native entry points (canvas, notebook) and desktop access drive success;\
    \ friction concentrates in highly active users but doesn't convert to shipping."
  height: 1000
